<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoji测试</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .emoji-list { margin: 20px 0; }
        .emoji-item { padding: 10px; border: 1px solid #ccc; margin: 5px 0; }
        button { padding: 10px 20px; background: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .result { margin-top: 10px; padding: 10px; background: #f5f5f5; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>🎁 Emoji测试工具</h1>
    
    <div>
        <button onclick="testEmoji()">测试创建带Emoji的奖品</button>
        <div class="result" id="result"></div>
    </div>
    
    <div>
        <button onclick="loadPrizes()">加载奖品列表</button>
        <div class="emoji-list" id="prizes-list"></div>
    </div>

    <script>
        const API_BASE = '/api';
        
        async function testEmoji() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '正在创建...';
            
            const testPrize = {
                name: 'Emoji测试奖品',
                icon: '🎁',
                probability: 10,
                stock: 100,
                description: '测试Emoji保存',
                status: 'active'
            };
            
            try {
                const response = await fetch(`${API_BASE}/prizes`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json; charset=utf-8' },
                    body: JSON.stringify(testPrize)
                });
                
                const result = await response.json();
                console.log('Response:', result);
                
                if (result.success) {
                    resultDiv.innerHTML = `
                        <p>✅ 创建成功！</p>
                        <pre>请求数据: ${JSON.stringify(testPrize)}</pre>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <p>❌ 创建失败！</p>
                        <pre>错误: ${result.message}</pre>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <p>❌ 请求失败！</p>
                    <pre>错误: ${error.message}</pre>
                `;
            }
        }
        
        async function loadPrizes() {
            const listDiv = document.getElementById('prizes-list');
            listDiv.innerHTML = '正在加载...';
            
            try {
                const response = await fetch(`${API_BASE}/prizes`, {
                    headers: { 'Content-Type': 'application/json; charset=utf-8' }
                });
                const result = await response.json();
                
                if (result.success) {
                    listDiv.innerHTML = result.data.map((prize, index) => `
                        <div class="emoji-item">
                            <strong>ID ${prize.id}:</strong> 
                            <span style="font-size: 24px;">${prize.icon || '❓'}</span> 
                            ${prize.name}
                        </div>
                    `).join('');
                } else {
                    listDiv.innerHTML = '加载失败';
                }
            } catch (error) {
                listDiv.innerHTML = `加载失败: ${error.message}`;
            }
        }
    </script>
</body>
</html>
